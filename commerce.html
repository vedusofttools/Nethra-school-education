<style>
:root {
  --primary:#2c3e50;
  --accent:#8e44ad;
  --success:#27ae60;
  --error:#e74c3c;
  --nav:#3498db;
  --bg:#f4f7f6;
}

body {
  margin:0;
  padding:20px;
  background:var(--bg);
  font-family:Segoe UI, sans-serif;
  display:flex;
  justify-content:center;
}

.container {
  width:100%;
  max-width:820px;
  background:#fff;
  padding:30px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.menu-grid {
  display:grid;
  grid-template-columns: 1fr; /* Single column for longer titles */
  gap:15px;
  margin-top:30px;
}

.menu-card {
  background:var(--primary);
  color:#fff;
  padding:20px;
  border-radius:10px;
  font-size:1.2em;
  font-weight:bold;
  text-align:left;
  cursor:pointer;
  transition: background 0.3s;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.menu-card span.q-count {
  background: rgba(255,255,255,0.2);
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 0.8em;
}

.menu-card:hover {
  background:var(--accent);
}

.nav-info {
  display:flex;
  justify-content:space-between;
  font-weight:bold;
  color:#7f8c8d;
  border-bottom:1px solid #eee;
  padding-bottom:10px;
  margin-bottom:20px;
  font-size: 1.1em;
}

.question-text {
  font-size:1.4em;
  text-align:center;
  color:var(--primary);
  margin-bottom:25px;
  min-height:3em;
}

.option {
  border:2px solid #eee;
  padding:15px;
  border-radius:10px;
  font-size:1.2em;
  cursor:pointer;
  margin-bottom:10px;
}

.option.selected {
  background:#f4f0ff;
  border-color:var(--accent);
}

.correct {
  background:#d4edda !important;
  border-color:var(--success) !important;
}

.wrong {
  background:#f8d7da !important;
  border-color:var(--error) !important;
}

.controls-row {
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:15px;
  flex-wrap:wrap;
}

.btn {
  padding:12px 20px;
  border:none;
  border-radius:25px;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

.btn-nav { background:var(--nav); }
.btn-confirm { background:var(--success); }
.btn-repeat { background:var(--accent); }
.btn-stop { background:#c0392b; }
.btn-home { background:#7f8c8d; }

.hidden { display:none; }
</style>
</head>

<body>

    <button class="btn btn-nav" onclick="nextQuestion()">Next →</button>

    <button class="btn btn-stop" onclick="stopSound()">🛑 Stop</button>

    v.name.includes("Heera") || 
    v.name.includes("Veena") ||

  );

  // Fallback if none of the above are found
  if (!voice) {
    voice = voices.find(v => v.lang.startsWith("en")) || voices[0];
  }
}

// Ensure voices load properly on all browsers
window.speechSynthesis.onvoiceschanged = initVoice;

function stopSound(){
  window.speechSynthesis.cancel();
}

function speak(text){
  stopSound();
  
  if (!voice) initVoice();

  // Replaces underscores with the word "blank"
  const cleanText = text.replace(/_+/g, " blank ");

  const u = new SpeechSynthesisUtterance(cleanText);
  
  // FORCE the language to Indian English (defaults to a clear female voice on most devices)
  u.lang = 'en-IN';
  
  if (voice) u.voice = voice;

  u.rate = 1.0; 
  u.pitch = 1.0;
  u.volume = 1.0;

  // CHROME BUG FIX: Prevents the browser from silently deleting the audio before playing
  window.speechUtteranceChunk = u;

  window.speechSynthesis.speak(u);
}
/* DYNAMIC MENU RENDER */
function renderMenu() {
  const grid = document.getElementById("menuGrid");
  grid.innerHTML = "";
  
  chaptersData.forEach((ch, index) => {
    const card = document.createElement("div");
    card.className = "menu-card";
    card.onclick = () => startChapter(index);
    
    card.innerHTML = `
      <div>Chapter ${ch.chapterNumber}: ${ch.title}</div>
      <span class="q-count">${ch.questions.length} Qs</span>
    `;
    grid.appendChild(card);
  });
}

/* CHAPTER LOGIC */
function startChapter(index){
  currentChapterData = chaptersData[index];
  
  document.getElementById("homeScreen").classList.add("hidden");
  document.getElementById("quizScreen").classList.remove("hidden");

  document.getElementById("chapterTitle").innerText = `Chapter ${currentChapterData.chapterNumber}: ${currentChapterData.title}`;

  currentIndex = 0;
  score = 0;
  answered = {};
  loadQuestion();
}

function loadQuestion(){
  selectedChoice = null;
  const q = currentChapterData.questions[currentIndex];
  const totalQs = currentChapterData.questions.length;

  document.getElementById("qText").innerText = q.q;
  document.getElementById("progressLabel").innerText = `Question ${currentIndex+1} / ${totalQs}`;

  document.getElementById("optionsBox").innerHTML =
    ["A","B","C","D"].map((l,i)=>`
      <div class="option" id="opt-${l}" onclick="selectOption('${l}')">
        <strong>${i+1}.</strong> ${q.options[l]}
      </div>
    `).join("");

  repeatQuestion();
}

function repeatQuestion(){
  const q = currentChapterData.questions[currentIndex];
  speak(
    `Question ${currentIndex+1}. ${q.q}.
     Option 1. ${q.options.A}.
     Option 2. ${q.options.B}.
     Option 3. ${q.options.C}.
     Option 4. ${q.options.D}.`
  );
}

function selectOption(letter){
  if (answered[currentIndex]) return;

  selectedChoice = letter;
  document.querySelectorAll(".option").forEach(o=>o.classList.remove("selected"));
  document.getElementById(`opt-${letter}`).classList.add("selected");

  speak(`You selected ${currentChapterData.questions[currentIndex].options[letter]}. Press Enter to confirm.`);
}

function confirmAnswer(){
  if (!selectedChoice || answered[currentIndex]) return;

  const q = currentChapterData.questions[currentIndex];
  const correct = q.correct;
  answered[currentIndex] = true;

  if (selectedChoice === correct){
    score++;
    document.getElementById(`opt-${selectedChoice}`).classList.add("correct");
    speak(`Correct. ${q.options[correct]}`);
  } else {
    document.getElementById(`opt-${selectedChoice}`).classList.add("wrong");
    document.getElementById(`opt-${correct}`).classList.add("correct");
    speak(`Incorrect. The correct answer is ${q.options[correct]}`);
  }
}

function nextQuestion(){
  const totalQs = currentChapterData.questions.length;
  if (currentIndex < totalQs - 1){
    currentIndex++;
    loadQuestion();
  } else {
    speak(`Chapter completed. Your score is ${score} out of ${totalQs}.`);
  }
}

function prevQuestion(){
  if (currentIndex > 0){
    currentIndex--;
    loadQuestion();
  }
}

function goHome(){
  stopSound();
  location.reload();
}

/* KEYBOARD CONTROLS FOR VISUALLY IMPAIRED STUDENTS */
window.addEventListener("keydown", e => {
  
  // 1. Prevent default browser behavior 
  if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight", "Enter"].indexOf(e.key) > -1) {
      e.preventDefault();
  }

  // 2. Selection Keys
  if (e.key === "1") selectOption("A");
  if (e.key === "2") selectOption("B");
  if (e.key === "3") selectOption("C");
  if (e.key === "4") selectOption("D");
  
  // 3. Confirm Key (Will ONLY confirm, never advance)
  if (e.key === "Enter") confirmAnswer(); 
  
  // 4. Navigation Keys
  if (e.key === "ArrowRight") nextQuestion(); // Move forward
  if (e.key === "ArrowLeft") prevQuestion();  // Move backward
  
  // 5. Audio & Home Controls
  if (e.key === "ArrowUp") repeatQuestion();  // Hear the question using Up Arrow
  if (e.key === "ArrowDown") stopSound();     // Immediately mute the audio
  if (e.key.toLowerCase() === "r") repeatQuestion(); // Hear the question using 'R' key
  if (e.key.toLowerCase() === "h") goHome();         // Return to Home menu using 'H' key
});
window.onload = () => {
  initVoice();
  renderMenu();
};
</script>
