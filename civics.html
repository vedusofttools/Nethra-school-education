<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Civics Master – Voice Based Chapters</title>

<style>
:root {
  --primary:#2c3e50;
  --accent:#8e44ad;
  --success:#27ae60;
  --error:#e74c3c;
  --nav:#3498db;
  --bg:#f4f7f6;
}

body {
  margin:0;
  padding:20px;
  background:var(--bg);
  font-family:Segoe UI, sans-serif;
  display:flex;
  justify-content:center;
}

.container {
  width:100%;
  max-width:820px;
  background:#fff;
  padding:30px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.menu-grid {
  display:grid;
  grid-template-columns: 1fr; /* Single column for longer titles */
  gap:15px;
  margin-top:30px;
}

.menu-card {
  background:var(--primary);
  color:#fff;
  padding:20px;
  border-radius:10px;
  font-size:1.2em;
  font-weight:bold;
  text-align:left;
  cursor:pointer;
  transition: background 0.3s;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.menu-card span.q-count {
  background: rgba(255,255,255,0.2);
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 0.8em;
}

.menu-card:hover {
  background:var(--accent);
}

.nav-info {
  display:flex;
  justify-content:space-between;
  font-weight:bold;
  color:#7f8c8d;
  border-bottom:1px solid #eee;
  padding-bottom:10px;
  margin-bottom:20px;
  font-size: 1.1em;
}

.question-text {
  font-size:1.4em;
  text-align:center;
  color:var(--primary);
  margin-bottom:25px;
  min-height:3em;
}

.option {
  border:2px solid #eee;
  padding:15px;
  border-radius:10px;
  font-size:1.2em;
  cursor:pointer;
  margin-bottom:10px;
}

.option.selected {
  background:#f4f0ff;
  border-color:var(--accent);
}

.correct {
  background:#d4edda !important;
  border-color:var(--success) !important;
}

.wrong {
  background:#f8d7da !important;
  border-color:var(--error) !important;
}

.controls-row {
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:15px;
  flex-wrap:wrap;
}

.btn {
  padding:12px 20px;
  border:none;
  border-radius:25px;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

.btn-nav { background:var(--nav); }
.btn-confirm { background:var(--success); }
.btn-repeat { background:var(--accent); }
.btn-stop { background:#c0392b; }
.btn-home { background:#7f8c8d; }

.hidden { display:none; }
</style>
</head>

<body>

<div class="container">

<div id="homeScreen">
  <h1 style="text-align:center;color:var(--primary)">Civics Chapter Tests</h1>
  <p style="text-align:center;color:#666">Select a chapter to begin</p>

  <div class="menu-grid" id="menuGrid">
    </div>
</div>

<div id="quizScreen" class="hidden">

  <div class="nav-info">

    <span id="progressLabel">Question 1/X</span>
  </div>

  <div class="question-text" id="qText"></div>
  <div id="optionsBox"></div>

  <div class="controls-row">
    <button class="btn btn-nav" onclick="prevQuestion()">← Prev</button>
    <button class="btn btn-confirm" onclick="confirmAnswer()">Confirm</button>
    <button class="btn btn-nav" onclick="nextQuestion()">Next →</button>
  </div>

  <div class="controls-row">
    <button class="btn btn-repeat" onclick="repeatQuestion()">🔊 Repeat</button>
    <button class="btn btn-stop" onclick="stopSound()">🛑 Stop</button>
    <button class="btn btn-home" onclick="goHome()">🏠 Home</button>
  </div>
</div>

</div>

      { q: "Which Constitutional Amendment Act of India made a provision for the word secular in the preamble?", options: { A: "44th Amendment Act", B: "73rd Amendment Act", C: "42nd Amendment Act", D: "86th Amendment Act" }, correct: "C" },
      { q: "Identify the features of a secular state?", options: { A: "State religion", B: "Religious taxation", C: "Theocracy", D: "No place for Religion, Equal status, No state religion" }, correct: "D" },
      { q: "Identify the wrong statement regarding a theocratic state:", options: { A: "Based primarily on religious elements", B: "A particular religion is declared official", C: "Rule of law prevails in a theocratic state", D: "Religious priests are given special significance" }, correct: "C" },
      { q: "Technically, theocracy means:", options: { A: "Rule by People", B: "Rule by God", C: "Rule by King", D: "Rule by Law" }, correct: "B" },
      { q: "What is the meaning of the term 'secular' in Latin?", options: { A: "Next world", B: "Divine", C: "Holy", D: "This world" }, correct: "D" },
      { q: "Who first used the term secular in modern times?", options: { A: "Machiavelli", B: "G.J. Holyoake", C: "John Locke", D: "Karl Marx" }, correct: "B" }
    ]
  },
  {
    chapterNumber: 11,
    title: "Constitution",
    questions: [
      { q: "When was the American constitution adopted?", options: { A: "1215 AD", B: "1688 AD", C: "1776 AD", D: "1789 AD" }, correct: "C" },
      { q: "Who played a key role in the formulation of the American constitution?", options: { A: "George Washington", B: "John Adams and James Madison", C: "Abraham Lincoln", D: "Alexander Hamilton" }, correct: "B" },
      { q: "Which country's constitution is the best example of a rigid constitution?", options: { A: "Britain", B: "India", C: "USA", D: "France" }, correct: "C" },
      { q: "Identify the wrong statement regarding a 'written constitution':", options: { A: "It is definite", B: "It is formulated by an assembly", C: "It is suitable to the uneducated and illiterate people", D: "It acts as a reference" }, correct: "C" },
      { q: "The term 'constitution' is derived from a Latin word which means:", options: { A: "To Establish", B: "To Rule", C: "To Document", D: "To Free" }, correct: "A" },
      { q: "Evolved constitution is also called as:", options: { A: "Enacted Constitution", B: "Cumulative Constitution", C: "Rigid Constitution", D: "Written Constitution" }, correct: "B" },
      { q: "Enacted constitution is also known as:", options: { A: "Conventional Constitution", B: "Cumulative Constitution", C: "Flexible Constitution", D: "Unwritten Constitution" }, correct: "A" },
      { q: "What is the first written constitution in the world?", options: { A: "Constitution of India", B: "Constitution of Britain", C: "Constitution of USA", D: "Constitution of France" }, correct: "C" },
      { q: "What is the lengthiest, largest and most detailed constitution in the world?", options: { A: "Constitution of USA", B: "Constitution of Britain", C: "Constitution of India", D: "Constitution of Australia" }, correct: "C" },
      { q: "Which country's constitution is the best example of an Unwritten and flexible constitution?", options: { A: "USA", B: "India", C: "Britain", D: "Canada" }, correct: "C" }
    ]
  },
  {
    chapterNumber: 12,
    title: "Government",
    questions: [
      { q: "Which country is the best example for a unitary government?", options: { A: "USA", B: "India", C: "Britain", D: "Australia" }, correct: "C" },
      { q: "What type of government is also known as responsible, cabinet, and Prime Ministerial government?", options: { A: "Presidential government", B: "Parliamentary government", C: "Dictatorship", D: "Monarchy" }, correct: "B" },
      { q: "Which of the following is NOT a feature of a federal government?", options: { A: "Written Constitution", B: "Single citizenship", C: "Division of Powers", D: "Independent Judiciary" }, correct: "B" },
      { q: "According to Aristotle's classification, what is the perverted form of polity?", options: { A: "Oligarchy", B: "Tyranny", C: "Democracy", D: "Aristocracy" }, correct: "C" },
      { q: "Collective responsibility is a salient feature of:", options: { A: "Presidential government", B: "Federal government", C: "Parliamentary government", D: "Unitary government" }, correct: "C" },
      { q: "The term federation is derived from the Latin word 'Foedus' which means:", options: { A: "Power and state", B: "Treaty or agreement", C: "Division", D: "Central rule" }, correct: "B" },
      { q: "The first federal system came into being in the USA in the year:", options: { A: "1776 AD", B: "1789 AD", C: "1865 AD", D: "1914 AD" }, correct: "B" },
      { q: "The theory of checks and balances is subsidiary to:", options: { A: "Theory of collective responsibility", B: "Theory of divine right", C: "The theory of separation of powers", D: "Theory of natural law" }, correct: "C" },
      { q: "Who advocated the theory of the separation of powers?", options: { A: "John Locke", B: "Montesquieu", C: "Rousseau", D: "Hobbes" }, correct: "B" },
      { q: "Which type of government is also known as Single Executive government?", options: { A: "Parliamentary government", B: "Federal government", C: "Unitary government", D: "Presidential government" }, correct: "D" }
    ]
  }
];

/* STATE */
let currentChapterData = null;
let currentIndex=0, score=0;
let selectedChoice=null, answered={};
let voice=null;

/* VOICE (BULLETPROOF FEMALE + BUG FIX + BLANK FILTER) */
function initVoice(){
  const voices = window.speechSynthesis.getVoices();
  if (voices.length === 0) return;

  // Try to find a clear female/Indian English voice
  voice = voices.find(v => 
    v.name.includes("Neerja") || 
    v.name.includes("Heera") || 
    v.name.includes("Veena") || 
    v.name.includes("Google UK English Female") || 
    v.name.includes("Zira") || 
    v.name.includes("female")
  );

  // Fallback if none of the above are found
  if (!voice) {
    voice = voices.find(v => v.lang.startsWith("en")) || voices[0];
  }
}

// Ensure voices load properly on all browsers
window.speechSynthesis.onvoiceschanged = initVoice;

function stopSound(){
  window.speechSynthesis.cancel();
}

function speak(text){
  stopSound();
  
  if (!voice) initVoice();

  // Replaces underscores with the word "blank"
  const cleanText = text.replace(/_+/g, " blank ");

  const u = new SpeechSynthesisUtterance(cleanText);
  
  // FORCE the language to Indian English (defaults to a clear female voice on most devices)
  u.lang = 'en-IN';
  
  if (voice) u.voice = voice;

  u.rate = 1.0; 
  u.pitch = 1.0;
  u.volume = 1.0;

  // CHROME BUG FIX: Prevents the browser from silently deleting the audio before playing
  window.speechUtteranceChunk = u;

  window.speechSynthesis.speak(u);
}
/* DYNAMIC MENU RENDER */
function renderMenu() {
  const grid = document.getElementById("menuGrid");
  grid.innerHTML = "";
  
  chaptersData.forEach((ch, index) => {
    const card = document.createElement("div");
    card.className = "menu-card";
    card.onclick = () => startChapter(index);
    
    card.innerHTML = `
      <div>Chapter ${ch.chapterNumber}: ${ch.title}</div>
      <span class="q-count">${ch.questions.length} Qs</span>
    `;
    grid.appendChild(card);
  });
}

/* CHAPTER LOGIC */
function startChapter(index){
  currentChapterData = chaptersData[index];
  
  document.getElementById("homeScreen").classList.add("hidden");
  document.getElementById("quizScreen").classList.remove("hidden");

  document.getElementById("chapterTitle").innerText = `Chapter ${currentChapterData.chapterNumber}: ${currentChapterData.title}`;

  currentIndex = 0;
  score = 0;
  answered = {};
  loadQuestion();
}

function loadQuestion(){
  selectedChoice = null;
  const q = currentChapterData.questions[currentIndex];
  const totalQs = currentChapterData.questions.length;

  document.getElementById("qText").innerText = q.q;
  document.getElementById("progressLabel").innerText = `Question ${currentIndex+1} / ${totalQs}`;

  document.getElementById("optionsBox").innerHTML =
    ["A","B","C","D"].map((l,i)=>`
      <div class="option" id="opt-${l}" onclick="selectOption('${l}')">
        <strong>${i+1}.</strong> ${q.options[l]}
      </div>
    `).join("");

  repeatQuestion();
}

function repeatQuestion(){
  const q = currentChapterData.questions[currentIndex];
  speak(
    `Question ${currentIndex+1}. ${q.q}.
     Option 1. ${q.options.A}.
     Option 2. ${q.options.B}.
     Option 3. ${q.options.C}.
     Option 4. ${q.options.D}.`
  );
}

function selectOption(letter){
  if (answered[currentIndex]) return;

  selectedChoice = letter;
  document.querySelectorAll(".option").forEach(o=>o.classList.remove("selected"));
  document.getElementById(`opt-${letter}`).classList.add("selected");

  speak(`You selected ${currentChapterData.questions[currentIndex].options[letter]}. Press Enter to confirm.`);
}

function confirmAnswer(){
  if (!selectedChoice || answered[currentIndex]) return;

  const q = currentChapterData.questions[currentIndex];
  const correct = q.correct;
  answered[currentIndex] = true;

  if (selectedChoice === correct){
    score++;
    document.getElementById(`opt-${selectedChoice}`).classList.add("correct");
    speak(`Correct. ${q.options[correct]}`);
  } else {
    document.getElementById(`opt-${selectedChoice}`).classList.add("wrong");
    document.getElementById(`opt-${correct}`).classList.add("correct");
    speak(`Incorrect. The correct answer is ${q.options[correct]}`);
  }
}

function nextQuestion(){
  const totalQs = currentChapterData.questions.length;
  if (currentIndex < totalQs - 1){
    currentIndex++;
    loadQuestion();
  } else {
    speak(`Chapter completed. Your score is ${score} out of ${totalQs}.`);
  }
}

function prevQuestion(){
  if (currentIndex > 0){
    currentIndex--;
    loadQuestion();
  }
}

function goHome(){
  stopSound();
  location.reload();
}

/* KEYBOARD CONTROLS FOR VISUALLY IMPAIRED STUDENTS */
window.addEventListener("keydown", e => {
  
  // 1. Prevent default browser behavior 
  if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight", "Enter"].indexOf(e.key) > -1) {
      e.preventDefault();
  }

  // 2. Selection Keys
  if (e.key === "1") selectOption("A");
  if (e.key === "2") selectOption("B");
  if (e.key === "3") selectOption("C");
  if (e.key === "4") selectOption("D");
  
  // 3. Confirm Key (Will ONLY confirm, never advance)
  if (e.key === "Enter") confirmAnswer(); 
  
  // 4. Navigation Keys
  if (e.key === "ArrowRight") nextQuestion(); // Move forward
  if (e.key === "ArrowLeft") prevQuestion();  // Move backward
  
  // 5. Audio & Home Controls
  if (e.key === "ArrowUp") repeatQuestion();  // Hear the question using Up Arrow
  if (e.key === "ArrowDown") stopSound();     // Immediately mute the audio
  if (e.key.toLowerCase() === "r") repeatQuestion(); // Hear the question using 'R' key
  if (e.key.toLowerCase() === "h") goHome();         // Return to Home menu using 'H' key
});
window.onload = () => {
  initVoice();
  renderMenu();
};
</script>
