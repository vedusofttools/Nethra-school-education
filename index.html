<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V Software Suite</title>

<style>
:root {
    --sidebar-width: 260px;
    --sidebar-bg: #2c3e50;
    --highlight: #f39c12;
    --link-hover: #34495e;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    height: 100vh;
}

/* SIDEBAR */
.sidebar {
    width: var(--sidebar-width);
    background: var(--sidebar-bg);
    color: white;
    padding: 20px;
}

.sidebar h2 {
    text-align: center;
    border-bottom: 1px solid #555;
    padding-bottom: 10px;
}

.nav-link {
    display: block;
    color: #ccc;
    text-decoration: none;
    padding: 10px;
    margin: 5px 0;
    border-radius: 6px;
}

.nav-link:hover {
    background: var(--link-hover);
    color: white;
}

/* MAIN */
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.header {
    background: white;
    padding: 15px;
    border-bottom: 2px solid var(--highlight);
}

.content {
    flex: 1;
}

/* iframe */
iframe {
    width: 100%;
    height: 100%;
    border: none;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>Study Hub</h2>

    <a href="#" class="nav-link" onclick="loadPage('home')">🏠 Home</a>
    <a href="#" class="nav-link" onclick="loadPage('Accounting.html')">📁 Accounting</a>
    <a href="#" class="nav-link" onclick="loadPage('Economics.html')">📊 Economics</a>
    <a href="#" class="nav-link" onclick="loadPage('civics.html')">🏛️ Civics</a>
    <a href="#" class="nav-link" onclick="loadPage('History.html')">📜 History</a>
    <a href="#" class="nav-link" onclick="loadPage('commerce.html')">💼 Commerce</a>
</div>

<!-- MAIN -->
<div class="main">

    <div class="header">
        <h1>V Software Suite</h1>
    </div>

    <div class="content" id="content">

        <!-- Default Home Screen -->
        <div id="home">
            <div style="padding:20px;">
                <h2>Welcome 👋</h2>
                <p>Select a subject from the sidebar</p>
            </div>
        </div>

        <!-- Iframe -->
        <iframe id="frame" style="display:none;"></iframe>

    </div>

</div>

<script>
function loadPage(page) {
    const frame = document.getElementById("frame");
    const home = document.getElementById("home");

    if (page === 'home') {
        frame.style.display = "none";
        home.style.display = "block";
    } else {
        frame.src = page;
        frame.style.display = "block";
        home.style.display = "none";
    }
}
</script>

</body>
</html>
