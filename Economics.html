<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Economics Master – Voice Based Chapters</title>

<style>
:root {
  --primary:#2c3e50;
  --accent:#8e44ad;
  --success:#27ae60;
  --error:#e74c3c;
  --nav:#3498db;
  --bg:#f4f7f6;
}

body {
  margin:0;
  padding:20px;
  background:var(--bg);
  font-family:Segoe UI, sans-serif;
  display:flex;
  justify-content:center;
}

.container {
  width:100%;
  max-width:820px;
  background:#fff;
  padding:30px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.menu-grid {
  display:grid;
  grid-template-columns: 1fr; /* Single column for longer titles */
  gap:15px;
  margin-top:30px;
}

.menu-card {
  background:var(--primary);
  color:#fff;
  padding:20px;
  border-radius:10px;
  font-size:1.2em;
  font-weight:bold;
  text-align:left;
  cursor:pointer;
  transition: background 0.3s;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.menu-card span.q-count {
  background: rgba(255,255,255,0.2);
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 0.8em;
}

.menu-card:hover {
  background:var(--accent);
}

.nav-info {
  display:flex;
  justify-content:space-between;
  font-weight:bold;
  color:#7f8c8d;
  border-bottom:1px solid #eee;
  padding-bottom:10px;
  margin-bottom:20px;
  font-size: 1.1em;
}

.question-text {
  font-size:1.4em;
  text-align:center;
  color:var(--primary);
  margin-bottom:25px;
  min-height:3em;
}

.option {
  border:2px solid #eee;
  padding:15px;
  border-radius:10px;
  font-size:1.2em;
  cursor:pointer;
  margin-bottom:10px;
}

.option.selected {
  background:#f4f0ff;
  border-color:var(--accent);
}

.correct {
  background:#d4edda !important;
  border-color:var(--success) !important;
}

.wrong {
  background:#f8d7da !important;
  border-color:var(--error) !important;
}

.controls-row {
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:15px;
  flex-wrap:wrap;
}

.btn {
  padding:12px 20px;
  border:none;
  border-radius:25px;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

.btn-nav { background:var(--nav); }
.btn-confirm { background:var(--success); }
.btn-repeat { background:var(--accent); }
.btn-stop { background:#c0392b; }
.btn-home { background:#7f8c8d; }

.hidden { display:none; }
</style>
</head>

<body>

<div class="container">

<div id="homeScreen">
  <h1 style="text-align:center;color:var(--primary)">Economics Chapter Tests</h1>
  <p style="text-align:center;color:#666">Select a chapter to begin</p>

  <div class="menu-grid" id="menuGrid">
    </div>
</div>

<div id="quizScreen" class="hidden">

  <div class="nav-info">
    <span id="chapterTitle">Chapter</span>
    <span id="progressLabel">Question 1/X</span>
  </div>

  <div class="question-text" id="qText"></div>
  <div id="optionsBox"></div>

  <div class="controls-row">
    <button class="btn btn-nav" onclick="prevQuestion()">← Prev</button>
    <button class="btn btn-confirm" onclick="confirmAnswer()">Confirm</button>
    <button class="btn btn-nav" onclick="nextQuestion()">Next →</button>
  </div>

  <div class="controls-row">
    <button class="btn btn-repeat" onclick="repeatQuestion()">🔊 Repeat</button>
    <button class="btn btn-stop" onclick="stopSound()">🛑 Stop</button>
    <button class="btn btn-home" onclick="goHome()">🏠 Home</button>
  </div>
</div>

</div>

      { q: "Gross Value Added at basic prices is equal to:", options: { A: "GDPMP − Net indirect taxes", B: "GDPFC + Net indirect taxes", C: "GNPMP − Depreciation", D: "NNPFC + NFIA" }, correct: "A" }

  },
  {

      { q: "The point at which aggregate demand is equal to aggregate supply is called:", options: { A: "Direct demand", B: "Indirect demand", C: "Effective demand", D: "Derived demand" }, correct: "C" },
      { q: "Which of the following is NOT considered as public revenue?", options: { A: "Direct taxes", B: "Indirect taxes", C: "Goods and Services Tax", D: "Transfer payments" }, correct: "D" },
      { q: "If revenue receipts are ₹800 crore, capital receipts are ₹500 crore, borrowings and other liabilities are ₹400 crore, and total expenditure is ₹1200 crore, the fiscal deficit is:", options: { A: "₹100 crore", B: "₹300 crore", C: "₹400 crore", D: "₹500 crore" }, correct: "B" },
      { q: "Goods and Services Tax (GST) in the government budget is classified as:", options: { A: "Direct tax", B: "Income tax", C: "Corporate tax", D: "Indirect tax" }, correct: "D" },
      { q: "Minimum interference of the government in economic activities is known as:", options: { A: "Socialism", B: "Mixed economy", C: "Laissez-faire", D: "Planned economy" }, correct: "C" },
      { q: "When total receipts are equal to total expenditure, the budget is called:", options: { A: "Deficit budget", B: "Surplus budget", C: "Balanced budget", D: "Primary budget" }, correct: "C" },
      { q: "The ratio of change in income to change in investment is known as:", options: { A: "Accelerator", B: "Multiplier", C: "Marginal propensity to consume", D: "Marginal propensity to save" }, correct: "B" },
      { q: "Fiscal deficit minus interest payments is equal to:", options: { A: "Budget deficit", B: "Primary deficit", C: "Revenue deficit", D: "Capital deficit" }, correct: "B" },
      { q: "If borrowings and other liabilities are added to the budget deficit, it becomes:", options: { A: "Revenue deficit", B: "Primary deficit", C: "Fiscal deficit", D: "Surplus budget" }, correct: "C" },
      { q: "In which year was Goods and Services Tax (GST) introduced in India?", options: { A: "2015", B: "2016", C: "2017", D: "2018" }, correct: "C" },
      { q: "The ratio of change in consumption to change in income is known as:", options: { A: "Multiplier", B: "Accelerator", C: "Marginal propensity to consume", D: "Marginal propensity to save" }, correct: "C" },
      { q: "The statement 'Supply creates its own demand' was given by:", options: { A: "J.M. Keynes", B: "Adam Smith", C: "J.B. Say", D: "David Ricardo" }, correct: "C" },
      { q: "The slope of the consumption function represents:", options: { A: "Multiplier", B: "Marginal propensity to save", C: "Average propensity to consume", D: "Marginal propensity to consume" }, correct: "D" },

  },
  {
    chapterNumber: 10,
    title: "Money, Banking and Inflation",

      { q: "The rate at which commercial banks borrow money from the RBI is called:", options: { A: "SLR", B: "Repo rate", C: "Reverse repo rate", D: "CRR" }, correct: "B" },
      { q: "When aggregate demand exceeds aggregate supply, it results in:", options: { A: "Cost-push inflation", B: "Creeping inflation", C: "Hyper inflation", D: "Demand-pull inflation" }, correct: "D" },

      { q: "Which measure of money supply is known as broad money?", options: { A: "M0", B: "M1", C: "M2", D: "M3" }, correct: "D" },

      { q: "An instrument for borrowing funds by selling securities with an agreement to repurchase them at a future date is known as:", options: { A: "Bank rate", B: "Reverse repo", C: "Repo rate", D: "Open market operation" }, correct: "C" }
    ]

];

/* STATE */
let currentChapterData = null;
let currentIndex=0, score=0;
let selectedChoice=null, answered={};
let voice=null;

/* VOICE (BULLETPROOF FEMALE + BUG FIX + BLANK FILTER) */
function initVoice(){
  const voices = window.speechSynthesis.getVoices();
  if (voices.length === 0) return;

  // Try to find a clear female/Indian English voice
  voice = voices.find(v => 
    v.name.includes("Neerja") || 
    v.name.includes("Heera") || 
    v.name.includes("Veena") || 
    v.name.includes("Google UK English Female") || 
    v.name.includes("Zira") || 
    v.name.includes("female")
  );

  // Fallback if none of the above are found
  if (!voice) {
    voice = voices.find(v => v.lang.startsWith("en")) || voices[0];
  }
}

// Ensure voices load properly on all browsers
window.speechSynthesis.onvoiceschanged = initVoice;

function stopSound(){
  window.speechSynthesis.cancel();
}

function speak(text){
  stopSound();
  
  if (!voice) initVoice();

  // Replaces underscores with the word "blank"
  const cleanText = text.replace(/_+/g, " blank ");

  const u = new SpeechSynthesisUtterance(cleanText);
  
  // FORCE the language to Indian English (defaults to a clear female voice on most devices)
  u.lang = 'en-IN';
  
  if (voice) u.voice = voice;

  u.rate = 1.0; 
  u.pitch = 1.0;
  u.volume = 1.0;

  // CHROME BUG FIX: Prevents the browser from silently deleting the audio before playing
  window.speechUtteranceChunk = u;

  window.speechSynthesis.speak(u);
}
/* DYNAMIC MENU RENDER */
function renderMenu() {
  const grid = document.getElementById("menuGrid");
  grid.innerHTML = "";
  
  chaptersData.forEach((ch, index) => {
    const card = document.createElement("div");
    card.className = "menu-card";
    card.onclick = () => startChapter(index);
    
    card.innerHTML = `
      <div>Chapter ${ch.chapterNumber}: ${ch.title}</div>
      <span class="q-count">${ch.questions.length} Qs</span>
    `;
    grid.appendChild(card);
  });
}

/* CHAPTER LOGIC */
function startChapter(index){
  currentChapterData = chaptersData[index];
  
  document.getElementById("homeScreen").classList.add("hidden");
  document.getElementById("quizScreen").classList.remove("hidden");

  document.getElementById("chapterTitle").innerText = `Chapter ${currentChapterData.chapterNumber}: ${currentChapterData.title}`;

  currentIndex = 0;
  score = 0;
  answered = {};
  loadQuestion();
}

function loadQuestion(){
  selectedChoice = null;
  const q = currentChapterData.questions[currentIndex];
  const totalQs = currentChapterData.questions.length;

  document.getElementById("qText").innerText = q.q;
  document.getElementById("progressLabel").innerText = `Question ${currentIndex+1} / ${totalQs}`;

  document.getElementById("optionsBox").innerHTML =
    ["A","B","C","D"].map((l,i)=>`
      <div class="option" id="opt-${l}" onclick="selectOption('${l}')">
        <strong>${i+1}.</strong> ${q.options[l]}
      </div>
    `).join("");

  repeatQuestion();
}

function repeatQuestion(){
  const q = currentChapterData.questions[currentIndex];
  speak(
    `Question ${currentIndex+1}. ${q.q}.
     Option 1. ${q.options.A}.
     Option 2. ${q.options.B}.
     Option 3. ${q.options.C}.
     Option 4. ${q.options.D}.`
  );
}

function selectOption(letter){
  if (answered[currentIndex]) return;

  selectedChoice = letter;
  document.querySelectorAll(".option").forEach(o=>o.classList.remove("selected"));
  document.getElementById(`opt-${letter}`).classList.add("selected");

  speak(`You selected ${currentChapterData.questions[currentIndex].options[letter]}. Press Enter to confirm.`);
}

function confirmAnswer(){
  if (!selectedChoice || answered[currentIndex]) return;

  const q = currentChapterData.questions[currentIndex];
  const correct = q.correct;
  answered[currentIndex] = true;

  if (selectedChoice === correct){
    score++;
    document.getElementById(`opt-${selectedChoice}`).classList.add("correct");
    speak(`Correct. ${q.options[correct]}`);
  } else {
    document.getElementById(`opt-${selectedChoice}`).classList.add("wrong");
    document.getElementById(`opt-${correct}`).classList.add("correct");
    speak(`Incorrect. The correct answer is ${q.options[correct]}`);
  }
}

function nextQuestion(){
  const totalQs = currentChapterData.questions.length;
  if (currentIndex < totalQs - 1){
    currentIndex++;
    loadQuestion();
  } else {
    speak(`Chapter completed. Your score is ${score} out of ${totalQs}.`);
  }
}

function prevQuestion(){
  if (currentIndex > 0){
    currentIndex--;
    loadQuestion();
  }
}

function goHome(){
  stopSound();
  location.reload();
}

/* KEYBOARD */
window.addEventListener("keydown", e => {
  if (e.key === "1") selectOption("A");
  if (e.key === "2") selectOption("B");
  if (e.key === "3") selectOption("C");
  if (e.key === "4") selectOption("D");
  if (e.key === "Enter") confirmAnswer();
});

window.onload = () => {
  initVoice();
  renderMenu();
};
</script>
