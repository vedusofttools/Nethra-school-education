<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accounts Master – Voice Based Chapters</title>

<style>
:root {
  --primary:#2c3e50;
  --accent:#8e44ad;
  --success:#27ae60;
  --error:#e74c3c;
  --nav:#3498db;
  --bg:#f4f7f6;
}

body {
  margin:0;
  padding:20px;
  background:var(--bg);
  font-family:Segoe UI, sans-serif;
  display:flex;
  justify-content:center;
}

.container {
  width:100%;
  max-width:820px;
  background:#fff;
  padding:30px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.menu-grid {
  display:grid;
  grid-template-columns: 1fr; /* Single column for longer titles */
  gap:15px;
  margin-top:30px;
}

.menu-card {
  background:var(--primary);
  color:#fff;
  padding:20px;
  border-radius:10px;
  font-size:1.2em;
  font-weight:bold;
  text-align:left;
  cursor:pointer;
  transition: background 0.3s;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.menu-card span.q-count {
  background: rgba(255,255,255,0.2);
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 0.8em;
}

.menu-card:hover {
  background:var(--accent);
}

.nav-info {
  display:flex;
  justify-content:space-between;
  font-weight:bold;
  color:#7f8c8d;
  border-bottom:1px solid #eee;
  padding-bottom:10px;
  margin-bottom:20px;
  font-size: 1.1em;
}

.question-text {
  font-size:1.4em;
  text-align:center;
  color:var(--primary);
  margin-bottom:25px;
  min-height:3em;
}

.option {
  border:2px solid #eee;
  padding:15px;
  border-radius:10px;
  font-size:1.2em;
  cursor:pointer;
  margin-bottom:10px;
}

.option.selected {
  background:#f4f0ff;
  border-color:var(--accent);
}

.correct {
  background:#d4edda !important;
  border-color:var(--success) !important;
}

.wrong {
  background:#f8d7da !important;
  border-color:var(--error) !important;
}

.controls-row {
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:15px;
  flex-wrap:wrap;
}

.btn {
  padding:12px 20px;
  border:none;
  border-radius:25px;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

.btn-nav { background:var(--nav); }
.btn-confirm { background:var(--success); }
.btn-repeat { background:var(--accent); }
.btn-stop { background:#c0392b; }
.btn-home { background:#7f8c8d; }

.hidden { display:none; }
</style>
</head>

<body>

<div class="container">

<div id="homeScreen">
  <h1 style="text-align:center;color:var(--primary)">Accounts Chapter Tests</h1>
  <p style="text-align:center;color:#666">Select a chapter to begin</p>

  <div class="menu-grid" id="menuGrid">
    </div>
</div>

<div id="quizScreen" class="hidden">

    <span id="progressLabel">Question 1/X</span>

  <div id="optionsBox"></div>

  <div class="controls-row">

    <button class="btn btn-confirm" onclick="confirmAnswer()">Confirm</button>
    <button class="btn btn-nav" onclick="nextQuestion()">Next →</button>
  </div>

  <div class="controls-row">
    <button class="btn btn-repeat" onclick="repeatQuestion()">🔊 Repeat</button>
    <button class="btn btn-stop" onclick="stopSound()">🛑 Stop</button>
    <button class="btn btn-home" onclick="goHome()">🏠 Home</button>

</div>

</div>

      { q: "All expenses and losses will appear on the _____ side of trial balance.", options: { A: "Credit", B: "Debit", C: "Asset", D: "Liability" }, correct: "B" },
      { q: "All incomes and gains will appear on the _____ side of the trial balance.", options: { A: "Debit", B: "Credit", C: "Asset", D: "Expense" }, correct: "B" }
    ]
  },
  {
    chapterNumber: 11,
    title: "Final Accounts",
    questions: [
      { q: "The statement prepared at the end of an accounting period are:", options: { A: "Journal entries", B: "Final Accounts", C: "Trial balances", D: "Ledger accounts" }, correct: "B" },
      { q: "The expenditure incurred for acquiring fixed assets is called:", options: { A: "Revenue expenditure", B: "Deferred revenue expenditure", C: "Capital expenditure", D: "Operating expenditure" }, correct: "C" },
      { q: "The capital expenditure has to be shown on the _____ side of the balance sheet.", options: { A: "Liabilities", B: "Assets", C: "Income", D: "Expense" }, correct: "B" },
      { q: "The expenditure incurred in the normal course of business activities is called:", options: { A: "Capital expenditure", B: "Revenue expenditures", C: "Deferred capital expenditure", D: "Non-operating expenditure" }, correct: "B" },
      { q: "An income which arises during the normal course or regular business activities is called:", options: { A: "Capital income", B: "Revenue income", C: "Deferred income", D: "Abnormal income" }, correct: "B" },
      { q: "_____ account is prepared to know the gross profit/gross loss.", options: { A: "Profit and loss", B: "Trading", C: "Balance sheet", D: "Capital" }, correct: "B" },
      { q: "All direct expenses should be debited to the _____ account.", options: { A: "Profit and loss", B: "Trading", C: "Capital", D: "Asset" }, correct: "B" },
      { q: "Cash purchases + credit purchases - Purchases returns = _____.", options: { A: "Gross purchases", B: "Net purchases", C: "Total sales", D: "Cost of goods sold" }, correct: "B" },
      { q: "The opening stock should appear on the _____ side of the trading accounts.", options: { A: "Credit", B: "Debit", C: "Asset", D: "Liability" }, correct: "B" },
      { q: "Cash sales + credit sales - sales returns = _____.", options: { A: "Gross sales", B: "Net sales", C: "Total purchases", D: "Cost of goods sold" }, correct: "B" },
      { q: "The unsold stock on the last day of the accounting period is called:", options: { A: "Opening stock", B: "Closing stock", C: "Dead stock", D: "Live stock" }, correct: "B" },
      { q: "The account which is prepared to know the net profit or net loss is called:", options: { A: "Trading account", B: "Profit and loss account", C: "Balance sheet", D: "Capital account" }, correct: "B" },
      { q: "All the indirect expenses will be debited to the _____ account.", options: { A: "Trading", B: "Profit and loss", C: "Capital", D: "Balance sheet" }, correct: "B" },
      { q: "The statement that is prepared to know the financial position of business is called:", options: { A: "Trading account", B: "Profit and loss account", C: "Balance sheet", D: "Trial balance" }, correct: "C" },
      { q: "The left hand side of the balance sheet is called the _____ side.", options: { A: "Assets", B: "Liability", C: "Debit", D: "Credit" }, correct: "B" },
      { q: "The right hand side of the balance sheet is called the _____ side.", options: { A: "Liability", B: "Assets", C: "Debit", D: "Credit" }, correct: "B" },
      { q: "The decline in the value of fixed asset is called:", options: { A: "Appreciation", B: "Depreciation", C: "Amortization", D: "Depletion" }, correct: "B" },
      { q: "The irrecoverable debts are known as:", options: { A: "Good debts", B: "Bad debts", C: "Doubtful debts", D: "Provision for debts" }, correct: "B" }
    ]
  },
  {
    chapterNumber: 12,
    title: "Final Accounts with Adjustments",
    questions: [
      { q: "Closing stock given in the trial balance should be recorded only on the _____ of balance sheet.", options: { A: "Liabilities side", B: "Assets side", C: "Debit side", D: "Credit side" }, correct: "B" },
      { q: "Outstanding salaries given in the trial balance should be recorded on the _____ of balance sheet.", options: { A: "Assets side", B: "Liabilities side", C: "Debit side", D: "Credit side" }, correct: "B" },
      { q: "The decline in the value of fixed asset is called:", options: { A: "Appreciation", B: "Depreciation", C: "Amortization", D: "Depletion" }, correct: "B" },
      { q: "Bad debts given in the trial balance should be recorded on the _____ of the profit and loss account.", options: { A: "Credit side", B: "Debit side", C: "Assets side", D: "Liabilities side" }, correct: "B" },
      { q: "Bad debts given in the adjustments should be recorded on debt side of the profit and loss account and immediately deducted from the _____ on the Asset side.", options: { A: "Creditors", B: "Debtors", C: "Bills receivable", D: "Cash" }, correct: "B" },
      { q: "Interest on capital given in the trial balance should be recorded on the debit side of the:", options: { A: "Trading account", B: "Profit and loss account", C: "Balance sheet", D: "Capital account" }, correct: "B" },
      { q: "Interest on drawings given in the trial balance should be recorded on the credit side of the:", options: { A: "Trading account", B: "Profit and loss account", C: "Balance sheet", D: "Capital account" }, correct: "B" }
    ]
  }
];

/* STATE */
let currentChapterData = null;
let currentIndex=0, score=0;
let selectedChoice=null, answered={};
let voice=null;

/* VOICE (BULLETPROOF FEMALE + BUG FIX + BLANK FILTER) */
function initVoice(){
  const voices = window.speechSynthesis.getVoices();
  if (voices.length === 0) return;

  // Try to find a clear female/Indian English voice
  voice = voices.find(v => 
    v.name.includes("Neerja") || 
    v.name.includes("Heera") || 
    v.name.includes("Veena") || 
    v.name.includes("Google UK English Female") || 
    v.name.includes("Zira") || 
    v.name.includes("female")
  );

  // Fallback if none of the above are found
  if (!voice) {
    voice = voices.find(v => v.lang.startsWith("en")) || voices[0];
  }
}

// Ensure voices load properly on all browsers
window.speechSynthesis.onvoiceschanged = initVoice;

function stopSound(){
  window.speechSynthesis.cancel();
}

function speak(text){
  stopSound();
  
  if (!voice) initVoice();

  // Replaces underscores with the word "blank"
  const cleanText = text.replace(/_+/g, " blank ");

  const u = new SpeechSynthesisUtterance(cleanText);
  
  // FORCE the language to Indian English (defaults to a clear female voice on most devices)
  u.lang = 'en-IN';
  
  if (voice) u.voice = voice;

  u.rate = 1.0; 
  u.pitch = 1.0;
  u.volume = 1.0;

  // CHROME BUG FIX: Prevents the browser from silently deleting the audio before playing
  window.speechUtteranceChunk = u;

  window.speechSynthesis.speak(u);
}
/* DYNAMIC MENU RENDER */
function renderMenu() {
  const grid = document.getElementById("menuGrid");
  grid.innerHTML = "";
  
  chaptersData.forEach((ch, index) => {
    const card = document.createElement("div");
    card.className = "menu-card";
    card.onclick = () => startChapter(index);
    
    card.innerHTML = `
      <div>Chapter ${ch.chapterNumber}: ${ch.title}</div>
      <span class="q-count">${ch.questions.length} Qs</span>
    `;
    grid.appendChild(card);
  });
}

/* CHAPTER LOGIC */
function startChapter(index){
  currentChapterData = chaptersData[index];
  
  document.getElementById("homeScreen").classList.add("hidden");
  document.getElementById("quizScreen").classList.remove("hidden");

  document.getElementById("chapterTitle").innerText = `Chapter ${currentChapterData.chapterNumber}: ${currentChapterData.title}`;

  currentIndex = 0;
  score = 0;
  answered = {};
  loadQuestion();
}

function loadQuestion(){
  selectedChoice = null;
  const q = currentChapterData.questions[currentIndex];
  const totalQs = currentChapterData.questions.length;

  document.getElementById("qText").innerText = q.q;
  document.getElementById("progressLabel").innerText = `Question ${currentIndex+1} / ${totalQs}`;

  document.getElementById("optionsBox").innerHTML =
    ["A","B","C","D"].map((l,i)=>`
      <div class="option" id="opt-${l}" onclick="selectOption('${l}')">
        <strong>${i+1}.</strong> ${q.options[l]}
      </div>
    `).join("");

  repeatQuestion();
}

function repeatQuestion(){
  const q = currentChapterData.questions[currentIndex];
  speak(
    `Question ${currentIndex+1}. ${q.q}.
     Option 1. ${q.options.A}.
     Option 2. ${q.options.B}.
     Option 3. ${q.options.C}.
     Option 4. ${q.options.D}.`
  );
}

function selectOption(letter){
  if (answered[currentIndex]) return;

  selectedChoice = letter;
  document.querySelectorAll(".option").forEach(o=>o.classList.remove("selected"));
  document.getElementById(`opt-${letter}`).classList.add("selected");

  speak(`You selected ${currentChapterData.questions[currentIndex].options[letter]}. Press Enter to confirm.`);
}

function confirmAnswer(){
  if (!selectedChoice || answered[currentIndex]) return;

  const q = currentChapterData.questions[currentIndex];
  const correct = q.correct;
  answered[currentIndex] = true;

  if (selectedChoice === correct){
    score++;
    document.getElementById(`opt-${selectedChoice}`).classList.add("correct");
    speak(`Correct. ${q.options[correct]}`);
  } else {
    document.getElementById(`opt-${selectedChoice}`).classList.add("wrong");
    document.getElementById(`opt-${correct}`).classList.add("correct");
    speak(`Incorrect. The correct answer is ${q.options[correct]}`);
  }
}

function nextQuestion(){
  const totalQs = currentChapterData.questions.length;
  if (currentIndex < totalQs - 1){
    currentIndex++;
    loadQuestion();
  } else {
    speak(`Chapter completed. Your score is ${score} out of ${totalQs}.`);
  }
}

function prevQuestion(){
  if (currentIndex > 0){
    currentIndex--;
    loadQuestion();
  }
}

function goHome(){
  stopSound();
  location.reload();
}
/* KEYBOARD CONTROLS FOR VISUALLY IMPAIRED STUDENTS */
window.addEventListener("keydown", e => {
  
  // 1. Prevent default browser behavior 
  if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight", "Enter"].indexOf(e.key) > -1) {
      e.preventDefault();
  }

  // 2. Selection Keys
  if (e.key === "1") selectOption("A");
  if (e.key === "2") selectOption("B");
  if (e.key === "3") selectOption("C");
  if (e.key === "4") selectOption("D");
  
  // 3. Confirm Key (Will ONLY confirm, never advance)
  if (e.key === "Enter") confirmAnswer(); 
  
  // 4. Navigation Keys
  if (e.key === "ArrowRight") nextQuestion(); // Move forward
  if (e.key === "ArrowLeft") prevQuestion();  // Move backward
  
  // 5. Audio & Home Controls
  if (e.key === "ArrowUp") repeatQuestion();  // Hear the question using Up Arrow
  if (e.key === "ArrowDown") stopSound();     // Immediately mute the audio
  if (e.key.toLowerCase() === "r") repeatQuestion(); // Hear the question using 'R' key
  if (e.key.toLowerCase() === "h") goHome();         // Return to Home menu using 'H' key
});
window.onload = () => {
  initVoice();
  renderMenu();
};
</script>
